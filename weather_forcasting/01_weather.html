<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Preview App</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="container">
    <h2>Image Upload</h2>

    <input type="file" id="fileInput" accept="image/*">

    <div class="preview-box">
      <img id="preview" />
    </div>

    <p id="fileInfo"></p>

    <button id="uploadBtn">Upload</button>

    <div class="progress">
      <div id="progressBar"></div>
    </div>

    <p id="status"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
