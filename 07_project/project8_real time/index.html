<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friend Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Video -->
  <video width="600" controls>

    <source src="viodio.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Card -->
  <div id="card">
    <img src="image.png" alt="Profile Image">


    <h1>ANGLE PRIYA</h1>
    <h5 id="status">Stranger</h5>

    <div id="btn-container">
      <button id="addBtn">Add Friend</button>
      <button id="removeBtn">Remove</button>
    </div>
  </div>

  <script>
    const statusText = document.getElementById("status");
    const addBtn = document.getElementById("addBtn");
    const removeBtn = document.getElementById("removeBtn");

    let isFriend = false;

    addBtn.addEventListener("click", () => {
      if (!isFriend) {
        statusText.textContent = "Friends";
        statusText.style.color = "green";
        isFriend = true;
      } else {
        statusText.textContent = "Stranger";
        statusText.style.color = "red";
        isFriend = false;
      }
    });

    removeBtn.addEventListener("click", () => {
      statusText.textContent = "Removed";
      statusText.style.color = "gray";
      isFriend = false;
    });
  </script>

</body>
</html>
