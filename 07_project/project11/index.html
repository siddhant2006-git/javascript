<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Manager</title>
  <link rel="stylesheet" href="index.css"/>
</head>

<body>

  <main class="container">
    <h1>Password Manager</h1>

    <!-- Add Account -->
    <section>
      <h2>Add Account</h2>

      <label for="site">Website</label>
      <input type="text" id="site" placeholder="Enter website"/>

      <label for="password">Password</label>
      <input type="text" id="password" placeholder="Enter password"/>

      <div class="actions">
        <button id="addBtn">Add</button>
        <button id="showBtn">Show All</button>
      </div>
    </section>

    <!-- Delete Account -->
    <section>
      <h2>Delete Account</h2>

      <label for="deleteSite">Website</label>
      <input type="text" id="deleteSite" placeholder="Enter website to delete"/>

      <button id="deleteBtn">Delete</button>
    </section>

    <!-- Display Accounts -->
    <section>
      <h2>Stored Accounts</h2>
      <ul id="accountList"></ul>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
