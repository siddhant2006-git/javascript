<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markdown Notes App</title>
  <link rel="stylesheet" href="index.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>Markdown Notes</h1>

    <div class="actions">
      <button id="newBtn">New</button>
      <button id="saveBtn">Save</button>
      <button id="deleteBtn">Delete</button>
      <button id="exportBtn">Export</button>
      <button id="editBtn">Edit</button>

      <label for="shareSelect">Share</label>
      <select id="shareSelect">
        <option value="all">All</option>
        <option value="email">Email</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="instagram">Instagram</option>
        <option value="twitter">Twitter</option>
      </select>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>Notes</h3>
      <ul id="notesList"></ul>
    </aside>

    <!-- EDITOR -->
    <section class="editor-section">

      <!-- TOOLBAR -->
      <div class="toolbar">
        <button data-format="h1">H1</button>
        <button data-format="h2">H2</button>
        <button data-format="bold">B</button>
        <button data-format="italic">I</button>
        <button data-format="code">Code</button>
      </div>

      <!-- SPLIT VIEW -->
      <div class="split">
        <textarea 
          id="editor" 
          placeholder="Write markdown here..."
        ></textarea>

        <div id="preview"></div>
      </div>

      <!-- STATUS -->
      <div id="status">Idle</div>

    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
