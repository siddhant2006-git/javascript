<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markdown Notes App</title>

  <link rel="stylesheet" href="index.css" />
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>Markdown Notes</h1>

    <div class="actions">
      <button id="newBtn">New</button>
      <button id="saveBtn">Save</button>
      <button id="deleteBtn">Delete</button>
      <button id="exportBtn">Export</button>
      <button id="editBtn">Edit</button>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main class="container">

    <!-- SIDEBAR (MULTI NOTES) -->
    <aside class="sidebar">
      <h3>Notes</h3>
      <ul id="notesList"></ul>
    </aside>

    <!-- EDITOR + PREVIEW -->
    <section class="editor-section">

      <!-- TOOLBAR -->
      <div class="toolbar">
  
  <button onclick="applyFormat('h1')">H1</button>
  <button onclick="applyFormat('h2')">H2</button>
  <button onclick="applyFormat('bold')">B</button>
  <button onclick="applyFormat('italic')">I</button>
  <button onclick="applyFormat('code')">Code</button>
</div>

      <!-- SPLIT VIEW -->
      <div class="split">

        <!-- TEXTAREA -->
      <!--<textarea> is used to create a multi-line text input field in HTML.-->  
        <textarea 
          id="editor" 
          placeholder="Write markdown here..."
        ></textarea>

        <!-- PREVIEW -->
        <div id="preview"></div>

      </div>

      <!-- STATUS -->
      <div id="status">Idle</div>

    </section>
  </main>

  <!-- SCRIPT -->
  <script src="index.js"></script>

</body>
</html>
